apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 10m
  chart:
    spec:
      chart: keda
      version: "2.*"
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    operator:
      replicaCount: 1
    resources:
      operator:
        requests:
          cpu: 50m
          memory: 64Mi
      metricServer:
        requests:
          cpu: 50m
          memory: 64Mi
      webhooks:
        requests:
          cpu: 10m
          memory: 32Mi
