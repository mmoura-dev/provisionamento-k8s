apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  dependsOn:
    - name: istiod          # métricas do Istio só fazem sentido com o Istio rodando
      namespace: istio-system
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.7.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    prometheus:
      prometheusSpec:
        # permite que o Prometheus descubra ServiceMonitors de qualquer namespace
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false

    grafana:
      enabled: true
      adminPassword: "admin"   # troque por um Secret em produção

    # desabilita componentes que conflitam com o Istio (já gerencia mTLS)
    prometheusOperator:
      tls:
        enabled: false
      admissionWebhooks:
        enabled: false
