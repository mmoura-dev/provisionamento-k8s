apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  dependsOn:
    - name: istiod          # métricas do Istio só fazem sentido com o Istio rodando
      namespace: istio-system
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.7.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    prometheus:
      prometheusSpec:
        # permite que o Prometheus descubra ServiceMonitors de qualquer namespace
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false

        extraScrapeConfigs: |
          - job_name: istiod
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [istio-system]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                action: keep
                regex: "istiod;http-monitoring"

          - job_name: envoy-stats
            metrics_path: /stats/prometheus
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                action: keep
                regex: ".*-envoy-prom"
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: '([^:]+)(?::\d+)?;(\d+)'
                replacement: "$1:15090"
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod_name

    grafana:
      enabled: true
      adminPassword: "admin"   # troque por um Secret em produção

    # desabilita componentes que conflitam com o Istio (já gerencia mTLS)
    prometheusOperator:
      tls:
        enabled: false
      admissionWebhooks:
        enabled: false
