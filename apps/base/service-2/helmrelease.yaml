apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: service-2
  namespace: service-2
spec:
  interval: 10m
  chart:
    spec:
      chart: nginx
      version: "19.*"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: service-2
  values:
    serviceAccount:
      create: false
      name: service-2
    automountServiceAccountToken: false
    service:
      type: ClusterIP
    podLabels:
      app: service-2
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
