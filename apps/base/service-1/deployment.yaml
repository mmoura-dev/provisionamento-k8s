apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-1
  namespace: service-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-1
  template:
    metadata:
      labels:
        app: service-1
    spec:
      automountServiceAccountToken: false
      serviceAccountName: service-1
      containers:
        - name: httpbin
          image: kennethreitz/httpbin@sha256:b138b9264903f46a43e1c750e07dc06f5d2a1bd5d51f37fb185bc608f61090dd
          ports:
            - containerPort: 80
